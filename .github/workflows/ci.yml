name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate repository structure
        run: |
          test -f AGENTS.md || (echo "Missing AGENTS.md" && exit 1)
          test -f docs/product-spec.md || (echo "Missing product-spec.md" && exit 1)
          for f in docs/agentic/STATE.md docs/agentic/BACKLOG.md; do
            test -f "$f" && echo "OK: $f" || echo "WARN: $f not yet created (CR-0002 pending)"
          done

  backend:
    needs: validate
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Backend check (placeholder)
        run: |
          if [ -d "backend" ]; then
            echo "Backend directory found. Tests would run here."
          else
            echo "SKIP: No backend yet (Milestone 1)"
          fi

  frontend:
    needs: validate
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Frontend check (placeholder)
        run: |
          if [ -d "frontend" ]; then
            echo "Frontend directory found. Tests would run here."
          else
            echo "SKIP: No frontend yet (Milestone 1)"
          fi
